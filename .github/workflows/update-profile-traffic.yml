name: Reset weekly profile counter

on:
  schedule:
    - cron: "17 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset-weekly-profile-counter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Refresh weekly Komarev key
        run: |
          week_start="$(date -u -d 'last sunday' +'%Y-%m-%d')"

          if [ "$(date -u +'%u')" = "7" ]; then
            week_start="$(date -u +'%Y-%m-%d')"
          fi

          weekly_key="luisbianconi-week-${week_start}"

          perl -0pi -e "s#https://komarev.com/ghpvc/\\?username=luisbianconi-week-[0-9]{4}-[0-9]{2}-[0-9]{2}&label=This%20week#https://komarev.com/ghpvc/?username=${weekly_key}&label=This%20week#g" README.md

      - name: Commit README update if needed
        run: |
          if git diff --quiet README.md; then
            echo "Weekly counter key already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Reset weekly profile counter"
          git push
